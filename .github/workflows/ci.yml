name: ci

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Check formatting
        run: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "Unformatted files:" >&2
            echo "$files" >&2
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -cover ./...

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        # The package-lock.json is generated on macOS arm64 and only records
        # @rolldown/binding-darwin-arm64. Even npm install respects the lockfile
        # and skips the linux-x64 binding (npm bug: github.com/npm/cli/issues/4828).
        # Deleting the lockfile before install lets npm resolve the correct
        # platform-specific optional binding for the CI runner.
        run: cd webapp && rm -f package-lock.json && npm install

      - name: Lint
        run: cd webapp && npm run lint

      - name: Type-check and build
        run: cd webapp && npm run build

  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Verify module dependencies
        run: go mod verify

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        continue-on-error: true
        run: $(go env GOPATH)/bin/govulncheck ./...
